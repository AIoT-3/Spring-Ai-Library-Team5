# PostgreSQL performance-test profile.
# Use only with a disposable performance DB/schema because the performance tests
# drop and recreate ${book.performance.schema}.books and
# ${book.performance.schema}.book_sequence before each strategy.

spring.test.database.replace=none

spring.datasource.driver-class-name=org.postgresql.Driver
book.performance.schema=${BOOK_PERFORMANCE_SCHEMA:book_perf}

spring.datasource.url=${BOOK_PERFORMANCE_DB_URL:jdbc:postgresql://localhost:15432/book_perf?rewriteBatchedInserts=true&stringtype=unspecified&currentSchema=${book.performance.schema},public}
spring.datasource.username=${BOOK_PERFORMANCE_DB_USERNAME:book}
spring.datasource.password=${BOOK_PERFORMANCE_DB_PASSWORD:book}
spring.datasource.type=com.zaxxer.hikari.HikariDataSource

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=${book.performance.schema}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.show_sql=false

spring.sql.init.mode=never
spring.batch.jdbc.initialize-schema=never
spring.data.jpa.repositories.enabled=false
init.enable=false
