# 활성 프로필 설정 (local, dev, prod 중 선택)
# 로컬 개발: 개발 서버: dev, 운영 서버: prod
spring.config.import=optional:file:.env[.properties]
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=false
# ==============================
# Init Book Data
# ==============================
init.book_file=init/BOOK_DB_202112.csv
init.enable=true
init.batch_size=1000
init.reset_before_load=false

# ===============================
# Datasource (DBCP2)
# ===============================
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL:jdbc:postgresql://s3.java21.net:8000/team5-library?stringtype=unspecified&currentSchema=public}
spring.datasource.username=${DB_USERNAME:library}
spring.datasource.password=${DB_PASSWORD:}


spring.datasource.type=org.apache.commons.dbcp2.BasicDataSource

# ===============================
# DBCP2 pool settings
# ===============================
spring.datasource.dbcp2.initial-size=5
spring.datasource.dbcp2.max-total=5
spring.datasource.dbcp2.max-idle=5
spring.datasource.dbcp2.min-idle=5

spring.datasource.dbcp2.test-on-borrow=true
spring.datasource.dbcp2.validation-query=SELECT 1

spring.datasource.dbcp2.pool-prepared-statements=true
spring.datasource.dbcp2.max-open-prepared-statements=100

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# Hibernate batch insert
# ===============================
spring.jpa.properties.hibernate.jdbc.batch_size=1000
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# ===============================
# Spring AI
# ===============================
spring.ai.openai.base-url=https://emb.java21.net
spring.ai.openai.api-key=${OPENAI_API_KEY:dummy}
spring.ai.openai.embedding.options.model=bge-m3


# ===============================
# Google gemini
# ===============================
spring.ai.google.genai.api-key=${GOOGLE_GENAI_API_KEY:}
spring.ai.google.genai.chat.options.model=gemini-2.5-flash
spring.ai.google.genai.chat.options.temperature=0.3
spring.ai.google.genai.project-id=unused

# ===============================
# Ollama
# ===============================
spring.ai.ollama.base-url=http://ollama.java21.net
spring.ai.ollama.chat.options.model=qwen2.5:3b-instruct-q4_K_M
spring.ai.ollama.chat.options.temperature=0.3
# qwen2.5:latest는 Function Calling (tools)을 지원합니다
# 다른 tools 지원 모델: llama3.1, llama3.3, mistral, mixtral

# Ollama 타임아웃 설정 (초 단위)
# Ollama 서버 응답이 느릴 경우 타임아웃 증가
spring.ai.ollama.chat.options.duration=300
spring.ai.ollama.init.timeout=300

# AI Model 선택 (gemini, ollama)
# Step 7 Function Calling을 위해 Ollama qwen2.5 사용 (tools 지원 모델)
spring.ai.selected-model=ollama
# qwen2.5 모델은 Function Calling (tools)을 완벽하게 지원합니다

# ===============================
# Scheduler settings
# ===============================
scheduler.embedding.enabled=true

# ===============================
# Cache settings
# ===============================
# Cache TTL in minutes (default 30 min)
cache.ttl.minutes=30

# Personalization cache settings
cache.personalization.ttl.hours=24
cache.personalization.max-size=1000

# Book search cache settings
cache.book-search.ttl.minutes=30
cache.book-search.max-size=500

# Library API cache settings
cache.library-api.ttl.minutes=60
cache.library-api.max-size=1000

# Review cache settings
cache.review.ttl.minutes=30
cache.review.max-size=500

# ===============================
# Library Information Naru API
# ===============================
library.api.url=http://data4library.kr/api
library.api.key=${LIBRARY_API_KEY:}
library.api.timeout=5000
library.api.cache-enabled=true

# ===============================
# Search Settings
# ===============================
app.search.default-page-size=10
app.search.max-page-size=100
app.search.default-limit=10

# ===============================
# Review Settings
# ===============================
app.review.limit=5
app.review.min-count-for-summary=5

# ===============================
# Batch Settings
# ===============================
app.batch.embedding-size=32
app.batch.default-batch-size=100

# ===============================
# AI/ML Settings
# ===============================
app.ai.max-review-summary-length=100
app.ai.retrieval-candidates=50
app.ai.max-candidates=5
app.ai.fallback-candidates=3
app.ai.min-relevance-score=50
app.ai.rrf-k=60

# ===============================
# Personalization Settings
# ===============================
app.personalization.min-feedback-count=3
app.personalization.max-feedback-count=20
