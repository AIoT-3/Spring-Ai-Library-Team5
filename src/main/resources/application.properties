spring.application.name=ai-library-team5

spring.config.import=optional:file:.env[.properties]
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
# ==============================
# Init Book Data
# ==============================
init.book_file=init/BOOK_DB_202112.csv
init.enable=false
init.batch_size=1000
init.reset_before_load=false

# ===============================
# Datasource (DBCP2)
# ===============================
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL:jdbc:postgresql://s3.java21.net:8000/team5-library?stringtype=unspecified&currentSchema=public&reWriteBatchedInserts=true}
spring.datasource.username=${DB_USERNAME:library}
spring.datasource.password=${DB_PASSWORD:}

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# Hibernate batch insert
# ===============================
spring.jpa.properties.hibernate.jdbc.batch_size=1000
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# ===============================
# Spring AI
# ===============================
spring.ai.model.embedding=openai
spring.ai.openai.base-url=${OPENAI_BASE_URL:https://emb.java21.net}
spring.ai.openai.api-key=${OPENAI_API_KEY:dummy}
spring.ai.openai.embedding.options.model=bge-m3
spring.ai.google.genai.api-key=${GOOGLE_GENAI_API_KEY:}

# ===============================
# Google Gemini 설정
# ===============================
spring.ai.genai.api-key=${GEMINI_API_KEY}
spring.ai.genai.chat.options.model=gemini-2.5-flash
spring.ai.genai.chat.options.temperature=0.5

# ===============================
# Ollama 설정 (선택)
# ===============================
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=hf.co/unsloth/Qwen3-4B-Instruct-2507-GGUF:Q4_K_M
spring.ai.ollama.chat.options.temperature=0.3

# 사용할 모델 선택 (gemini 또는 ollama)
spring.ai.selected-model=ollama
# ===============================
# Scheduler settings
# ===============================
scheduler.embedding.enabled=false

# ===============================
# Cache settings
# ===============================
# Cache TTL in minutes (default 30 min)
cache.ttl.minutes=30

# Personalization cache settings
cache.personalization.ttl.hours=24

# Book search cache settings
cache.book-search.ttl.minutes=30

# Library API cache settings
cache.library-api.ttl.minutes=60

# Review cache settings
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.database=0
spring.data.redis.password=${REDIS_PASSWORD}

# RAG semantic cache settings
app.rag.semantic-cache.enabled=true
app.rag.semantic-cache.ttl-minutes=100
app.rag.semantic-cache.similarity-threshold=0.8
app.rag.semantic-cache.max-candidates-to-compare=200
app.rag.semantic-cache.max-index-size=2000
app.rag.semantic-cache.version=rag-semantic:v1
app.rag.candidates=5


# ===============================
# Library Information Naru API
# ===============================
library.api.url=http://data4library.kr/api
library.api.key=${LIBRARY_API_KEY:}
library.api.timeout=5000
library.api.cache-enabled=true

# ===============================
# Search Settings
# ===============================
app.search.default-page-size=10
app.search.max-page-size=100
app.search.default-limit=10



# ===============================
# Batch Settings
# ===============================
app.batch.embedding-size=32
app.batch.default-batch-size=100
